<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="88" height="88" rx="20" ry="20" fill="url(#g1)"/>

  <!-- pickaxe head (data mining metaphor) -->
  <g transform="translate(48 48) rotate(-30)">
    <rect x="-3" y="-26" width="6" height="40" rx="2" fill="#ffffff"/>
    <path d="M -22 -22 Q 0 -32 22 -22 L 18 -16 Q 0 -22 -18 -16 Z" fill="url(#g2)"/>
  </g>

  <!-- data dots (nodes) -->
  <circle cx="22" cy="70" r="4" fill="#ffffff"/>
  <circle cx="38" cy="76" r="3" fill="#ffffff" opacity="0.85"/>
  <circle cx="56" cy="74" r="3" fill="#ffffff" opacity="0.7"/>
  <circle cx="72" cy="68" r="4" fill="#ffffff"/>

  <!-- connecting lines -->
  <path d="M 22 70 L 38 76 L 56 74 L 72 68"
        stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
