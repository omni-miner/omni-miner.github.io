<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#fde047"/>
      <stop offset="55%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"   stop-color="#fffbeb"/>
      <stop offset="55%"  stop-color="#fef3c7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg)"/>

  <!-- subtle hex ring connecting outer nodes -->
  <polygon points="48,20 72,34 72,62 48,76 24,62 24,34"
           fill="none" stroke="#fffbeb" stroke-width="1.5"
           stroke-linejoin="round" opacity="0.4"/>

  <!-- spokes from center to each node -->
  <g stroke="#fffbeb" stroke-width="2.2" stroke-linecap="round" opacity="0.95">
    <line x1="48" y1="48" x2="48" y2="20"/>
    <line x1="48" y1="48" x2="72" y2="34"/>
    <line x1="48" y1="48" x2="72" y2="62"/>
    <line x1="48" y1="48" x2="48" y2="76"/>
    <line x1="48" y1="48" x2="24" y2="62"/>
    <line x1="48" y1="48" x2="24" y2="34"/>
  </g>

  <!-- outer nodes -->
  <g fill="#fffbeb">
    <circle cx="48" cy="20" r="4.5"/>
    <circle cx="72" cy="34" r="4.5"/>
    <circle cx="72" cy="62" r="4.5"/>
    <circle cx="48" cy="76" r="4.5"/>
    <circle cx="24" cy="62" r="4.5"/>
    <circle cx="24" cy="34" r="4.5"/>
  </g>

  <!-- central hub -->
  <circle cx="48" cy="48" r="12" fill="url(#core)"/>
  <circle cx="48" cy="48" r="6.5" fill="#fffbeb"/>
</svg>
