<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg)"/>

  <!-- orbits (3 ellipses at 0°, 60°, 120°) -->
  <g fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"
     transform="translate(48 48)">
    <ellipse rx="34" ry="13" opacity="0.95"/>
    <ellipse rx="34" ry="13" transform="rotate(60)" opacity="0.85"/>
    <ellipse rx="34" ry="13" transform="rotate(120)" opacity="0.75"/>
  </g>

  <!-- particles on orbits -->
  <circle cx="82" cy="48" r="3.2" fill="#ffffff"/>
  <circle cx="31" cy="18.6" r="2.6" fill="#ffffff" opacity="0.9"/>
  <circle cx="31" cy="77.4" r="2.6" fill="#ffffff" opacity="0.85"/>

  <!-- central core with halo -->
  <circle cx="48" cy="48" r="11" fill="url(#core)"/>
  <circle cx="48" cy="48" r="5" fill="#ffffff"/>
</svg>
