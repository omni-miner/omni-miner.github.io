<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="4" y="4" width="88" height="88" rx="22" fill="url(#bg)"/>

  <!-- back peak (taller, semi-transparent) -->
  <path d="M 26 76 L 56 26 L 86 76 Z" fill="#ffffff" opacity="0.45"/>

  <!-- front peak (bolder, overlapping) -->
  <path d="M 10 76 L 38 40 L 62 76 Z" fill="#ffffff"/>

  <!-- ground line -->
  <line x1="10" y1="76" x2="86" y2="76"
        stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

  <!-- data spark above the back peak -->
  <circle cx="56" cy="18" r="9" fill="url(#spark)"/>
  <circle cx="56" cy="18" r="3.5" fill="#ffffff"/>
</svg>
